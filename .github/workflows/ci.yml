name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不指定 version，自动读取 package.json 的 packageManager 字段

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ai-task-manager/shared build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint
        continue-on-error: true

      - name: Build
        run: pnpm run build
        env:
          DATABASE_URL: "file:./ci.db"
          JWT_SECRET: "ci-secret-not-for-production"
          AI_GATEWAY_PROVIDER: "mock"

  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不指定 version，自动读取 package.json 的 packageManager 字段

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ai-task-manager/shared build

      - name: Run server tests
        run: pnpm --filter @ai-task-manager/server test
        env:
          DATABASE_URL: "file:./test.db"
          JWT_SECRET: "test-secret"
          AI_GATEWAY_PROVIDER: "mock"
